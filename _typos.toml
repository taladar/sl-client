# The vendored LL message template is upstream content with many typos in its
# comments and message names; it is not ours to correct.
[files]
extend-exclude = ["sl-wire/message_template.msg"]

[default]
# The conformance records stamp a git-describe hash (e.g. "a843ba4-dirty") in
# `behavior_describe`; arbitrary hex can spell a "typo" (…ba… → by/be), so
# ignore that field's quoted value.
extend-ignore-re = ['behavior_describe = "[^"]*"']

[default.extend-words]
# "LOD" = level of detail (mesh rendering term), not a typo of "LOAD".
LOD = "LOD"
# "delink" is the LLUDP message name `ObjectDelink` (and our `delink_objects`
# wrapper), not a typo of "unlink".
delink = "delink"
Delink = "Delink"
# "SIZ"/"siz" is the JPEG-2000 codestream image-size marker (and its `Lsiz`/
# `Xsiz`/… fields), used by the `sl-proto::j2c` header parser; not a typo.
SIZ = "SIZ"
siz = "siz"

[default.extend-identifiers]
# `flate2` is the gzip crate (used for the inventory disk cache); not a typo
# of "flat".
flate2 = "flate2"
# `lso2` is the legacy-LSL-bytecode compile-target token (LSO2), an emerging
# `ScriptTarget` value seen in the LL viewer; not a typo of "also".
lso2 = "lso2"
