# The vendored LL message template is upstream content with many typos in its
# comments and message names; it is not ours to correct.
#
# `*.ftl` are Project Fluent translation bundles (viewer-i18n-fluent-scaffold):
# they are prose in many languages by design, so an English typo checker only
# produces false positives over them. Excluded wholesale rather than
# allow-listing each foreign word as more locales land.
[files]
extend-exclude = ["sl-wire/message_template.msg", "*.ftl"]

[default]
# The conformance records stamp a git-describe hash (e.g. "a843ba4-dirty") in
# `behavior_describe`; arbitrary hex can spell a "typo" (…ba… → by/be), so
# ignore that field's quoted value.
extend-ignore-re = ['behavior_describe = "[^"]*"']

[default.extend-words]
# "LOD" = level of detail (mesh rendering term), not a typo of "LOAD".
LOD = "LOD"
# "delink" is the LLUDP message name `ObjectDelink` (and our `delink_objects`
# wrapper), not a typo of "unlink".
delink = "delink"
Delink = "Delink"
# "SIZ"/"siz" is the JPEG-2000 codestream image-size marker (and its `Lsiz`/
# `Xsiz`/… fields), used by the `sl-proto::j2c` header parser; not a typo.
SIZ = "SIZ"
siz = "siz"
# "LSO" is Linden Script Object — the legacy LSL bytecode format (see the
# `lso2` compile target below and tailslide's `passes/lso`); not a typo of "also".
LSO = "LSO"
lso = "lso"
# "elementy" is the Polish plural (`few` category) of "element". The `pl` bundle
# itself is excluded (`*.ftl` above), but the i18n unit tests assert on the
# formatted Polish string in Rust source; Polish, not a typo of "elementary".
elementy = "elementy"

[default.extend-identifiers]
# `flate2` is the gzip crate (used for the inventory disk cache); not a typo
# of "flat".
flate2 = "flate2"
# `lso2` is the legacy-LSL-bytecode compile-target token (LSO2), an emerging
# `ScriptTarget` value seen in the LL viewer; not a typo of "also".
lso2 = "lso2"
# `hightlightAndHide` is Firestorm's own (misspelled) method name for its
# status-bar menu-search filter — cited verbatim so it stays greppable in the
# reference source; theirs to spell, not ours to correct.
hightlightAndHide = "hightlightAndHide"
