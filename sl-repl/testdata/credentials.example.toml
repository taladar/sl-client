# Example sl-repl credentials file.
#
# Copy this to `credentials.toml` (which is gitignored) and fill in real
# values, or point the binaries at it with `--credentials <path>`. Never commit
# a file containing a real password.
#
# Run against the local OpenSim test grid (opensim.service, login
# http://127.0.0.1:9000/) with the test avatar whose password lives in the
# repo's gitignored `.env` (SL_FIRST / SL_LAST / SL_PASSWORD).

default_avatar = "tester"

[avatars.tester]
first = "Avatar"
last = "Tester"
password = "REPLACE_WITH_SL_PASSWORD_FROM_DOTENV"
login_uri = "http://127.0.0.1:9000/"

# A Second Life (agni/aditi) avatar with TOTP multi-factor authentication.
# `mfa_command` is run when the grid issues an MFA challenge; its stdout is the
# one-time token. The acquisition waits out the tail of the current 30-second
# TOTP window when fewer than `mfa_window_guard_secs` seconds remain.
#
# [avatars.aditi]
# first = "Your"
# last = "Resident"
# password = "REPLACE_ME"
# grid = "aditi"
# mfa_command = "oathtool --totp -b YOURBASE32SECRET"
# mfa_window_guard_secs = 5
